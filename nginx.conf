server {
    listen       8080;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # Compression for text assets.
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain text/css application/javascript application/json image/svg+xml font/woff2;

    # Baseline security headers (TLS/HSTS is handled by the global nginx).
    add_header X-Content-Type-Options "nosniff"                     always;
    add_header X-Frame-Options        "SAMEORIGIN"                  always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Hashed build assets are immutable — cache aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # The HTML entrypoint must never be cached, so new deploys are picked up.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback: unknown paths serve index.html so client-side routing
    # (e.g. /dashboard) works on refresh and deep links.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
